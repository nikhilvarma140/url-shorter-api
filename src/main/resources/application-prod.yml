spring:
  datasource:
    url: ${DATABASE_URL}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration

app:
  jwt:
    secret: ${JWT_SECRET}
    expiration-ms: 86400000
  base-url: ${BASE_URL}
  rate-limit:
    max-requests: 100
    window-minutes: 1
