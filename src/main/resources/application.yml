spring:
  application:
    name: url-shortener-api

  # H2 for local development (switch to PostgreSQL in production)
  datasource:
    url: jdbc:h2:mem:urlshortener
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  # Redis (disabled for local dev, enable when Redis is available)
  data:
    redis:
      host: localhost
      port: 6379

app:
  jwt:
    secret: ThisIsASecretKeyForJWTTokenGenerationMustBe256BitsLong!!
    expiration-ms: 86400000  # 24 hours

  base-url: http://localhost:8080

  rate-limit:
    max-requests: 100
    window-minutes: 1

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
